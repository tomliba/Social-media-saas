<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
}

:root {
  --bg: #1a1a1a;
  --accent: #E91E63;
  --text: #FFFFFF;
  --text-muted: #888888;
}

.tweet-card {
  width: 920px;
  border: 1px solid rgba(136, 136, 136, 0.15);
  border-radius: 24px;
  padding: 48px;
}

.tweet-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
}

.tweet-photo {
  display: var(--photo-display);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}

.tweet-author {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.tweet-name-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.tweet-display-name {
  font-size: 34px;
  font-weight: 700;
  color: var(--text);
}

.tweet-verified {
  width: 28px;
  height: 28px;
  background: #1D9BF0;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.tweet-verified svg {
  width: 16px;
  height: 16px;
  fill: #FFFFFF;
}

.tweet-handle {
  font-size: 34px;
  font-weight: 400;
  color: var(--text-muted);
}

.tweet-text {
  font-size: 46px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 40px;
}

.tweet-meta {
  font-size: 28px;
  font-weight: 400;
  color: var(--text-muted);
  margin-bottom: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(136, 136, 136, 0.15);
}

.tweet-engagement {
  font-size: 28px;
  font-weight: 400;
  color: var(--text-muted);
}

.tweet-engagement strong {
  color: var(--text);
  font-weight: 700;
}
</style>
</head>
<body>
  <div class="tweet-card">
    <div class="tweet-header">
      <img class="tweet-photo" src="{{photoUrl}}" alt="" />
      <div class="tweet-author">
        <div class="tweet-name-row">
          <span class="tweet-display-name">{{displayName}}</span>
          <div class="tweet-verified">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </div>
        </div>
        <span class="tweet-handle">{{handle}}</span>
      </div>
    </div>
    <div class="tweet-text">{{tweetText}}</div>
    <div class="tweet-meta">12:34 PM · Apr 1, 2026</div>
    <div class="tweet-engagement"><strong>2.4K</strong> Likes · <strong>847</strong> Retweets</div>
  </div>
</body>
</html>
