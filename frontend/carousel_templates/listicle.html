<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  padding: 80px 72px;
  position: relative;
}

:root {
  --bg: #1a1a1a;
  --accent: #E91E63;
  --text: #FFFFFF;
  --text-muted: #888888;
}

.gradient-strip {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #FF6B6B, #FFE66D, #4ECB71, #45B7D1, var(--accent));
}

.top-label {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.title {
  font-size: 60px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 56px;
}

.items {
  display: flex;
  flex-direction: column;
  gap: 20px;
  flex: 1;
}

.item {
  display: flex;
  align-items: center;
  gap: 28px;
  background: rgba(255,255,255,.05);
  border-radius: 16px;
  padding: 28px 32px;
  border-left: 4px solid var(--accent);
}

.item:nth-child(1) { border-left-color: var(--accent); }
.item:nth-child(2) { border-left-color: color-mix(in srgb, var(--accent) 80%, white); }
.item:nth-child(3) { border-left-color: color-mix(in srgb, var(--accent) 60%, white); }
.item:nth-child(4) { border-left-color: color-mix(in srgb, var(--accent) 45%, white); }
.item:nth-child(5) { border-left-color: color-mix(in srgb, var(--accent) 30%, white); }

.item-number {
  font-size: 48px;
  font-weight: 800;
  color: var(--accent);
  min-width: 56px;
}

.item-text {
  font-size: 36px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
}

.item.empty { display: none; }
</style>
</head>
<body>
  <div class="gradient-strip"></div>
  <div class="top-label">TOP 5</div>
  <div class="title">{{title}}</div>
  <div class="items">
    <div class="item">
      <div class="item-number">1</div>
      <div class="item-text">{{item1}}</div>
    </div>
    <div class="item">
      <div class="item-number">2</div>
      <div class="item-text">{{item2}}</div>
    </div>
    <div class="item">
      <div class="item-number">3</div>
      <div class="item-text">{{item3}}</div>
    </div>
    <div class="item {{item4}}empty">
      <div class="item-number">4</div>
      <div class="item-text">{{item4}}</div>
    </div>
    <div class="item {{item5}}empty">
      <div class="item-number">5</div>
      <div class="item-text">{{item5}}</div>
    </div>
  </div>
</body>
</html>
