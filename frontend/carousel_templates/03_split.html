<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  display: flex;
}

:root {
  --bg: #FFFFFF;
  --accent: #764ba2;
  --accent-light: #f3e8ff;
  --text: #111111;
  --text-muted: #555555;
  --text-label: #999999;
}

.left-panel {
  width: 45%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 48px;
}

.left-label {
  font-size: 22px;
  color: rgba(255,255,255,.6);
  letter-spacing: 3px;
  font-weight: 600;
  margin-bottom: 12px;
}

.left-divider {
  width: 50px;
  height: 3px;
  background: rgba(255,255,255,.4);
  border-radius: 2px;
}

.right-panel {
  width: 55%;
  background: var(--bg);
  padding: 64px;
  display: flex;
  flex-direction: column;
}

.section-label {
  font-size: 24px;
  color: var(--text-label);
  letter-spacing: 4px;
  font-weight: 600;
  margin-bottom: 36px;
}

.headline {
  font-size: 56px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 24px;
}

.headline .accent { color: var(--accent); }

.divider {
  width: 60px;
  height: 4px;
  background: var(--accent);
  border-radius: 2px;
  margin-bottom: 32px;
}

.body-text {
  font-size: 32px;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: auto;
}

.numbered-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 40px;
}

.numbered-item {
  display: flex;
  gap: 16px;
  align-items: center;
}

.number-badge {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
}

.numbered-text {
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
}
</style>
</head>
<body>
  <div class="left-panel">
    <div class="left-label">SLIDE {{slideNumber}} OF {{totalSlides}}</div>
    <div class="left-divider"></div>
  </div>
  
  <div class="right-panel">
    <div class="section-label">{{sectionLabel}}</div>
    <div class="headline">Most teams are still doing everything <span class="accent">manually</span></div>
    <div class="divider"></div>
    <div class="body-text">Content creation, reporting, onboarding. Hours wasted on work that AI handles in minutes.</div>
    
    <div class="numbered-list">
      <div class="numbered-item">
        <div class="number-badge">1</div>
        <div class="numbered-text">Automate repetitive tasks</div>
      </div>
      <div class="numbered-item">
        <div class="number-badge">2</div>
        <div class="numbered-text">Focus humans on strategy</div>
      </div>
      <div class="numbered-item">
        <div class="number-badge">3</div>
        <div class="numbered-text">Start with one tool</div>
      </div>
    </div>
  </div>
</body>
</html>
