<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

:root {
  --bg: #FAFAFA;
  --accent: #E91E63;
  --text: #111111;
  --text-muted: #BBBBBB;
}

.slide-number {
  position: absolute;
  top: 80px;
  font-size: 24px;
  color: var(--text-muted);
  letter-spacing: 6px;
}

.main-text {
  font-size: 76px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  max-width: 820px;
  padding: 0 80px;
}

.divider {
  width: 80px;
  height: 2px;
  background: var(--text-muted);
  margin: 48px 0;
}

.accent-text {
  font-size: 76px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1.2;
  max-width: 820px;
  padding: 0 80px;
}

.progress-dots {
  position: absolute;
  bottom: 80px;
  display: flex;
  gap: 10px;
}

.dot {
  width: 40px;
  height: 6px;
  border-radius: 3px;
  background: var(--text-muted);
  opacity: 0.4;
}

.dot.active {
  background: var(--accent);
  opacity: 1;
}
</style>
</head>
<body>
  <div class="slide-number">{{slideNumber}}</div>
  <div class="main-text">{{textLine1}}</div>
  <div class="divider"></div>
  <div class="accent-text">{{textLine2}}</div>

  <div class="progress-dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
