<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
}

:root {
  --bg: #F2F2F7;
  --note-bg: #FFFFFF;
  --bar: #FF9500;
  --text: #1C1C1E;
  --text-secondary: #8E8E93;
  --separator: #E5E5EA;
  --link: #007AFF;
  --highlight-bg: #FFEF99;
}

.status-bar {
  height: 54px;
  padding: 0 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
}

.status-icons {
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 18px;
}

.nav-bar {
  padding: 8px 40px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav-back {
  font-size: 26px;
  color: var(--link);
  display: flex;
  align-items: center;
  gap: 4px;
}

.nav-title {
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
}

.nav-action {
  font-size: 26px;
  color: var(--link);
}

.note-container {
  background: var(--note-bg);
  margin: 0 28px;
  border-radius: 20px;
  padding: 48px 44px;
  min-height: 1080px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}

.note-date {
  font-size: 22px;
  color: var(--text-secondary);
  text-align: center;
  margin-bottom: 32px;
}

.note-title {
  font-size: 52px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 28px;
}

.note-divider {
  height: 1px;
  background: var(--separator);
  margin: 24px 0;
}

.note-text {
  font-size: 34px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
}

.note-text .highlight {
  background: var(--highlight-bg);
  padding: 2px 6px;
  border-radius: 4px;
}

.note-text .bold {
  font-weight: 800;
}

.note-bullet {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 20px;
  padding-left: 8px;
}

.bullet-checkbox {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2.5px solid var(--bar);
  flex-shrink: 0;
  margin-top: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bullet-checkbox.checked {
  background: var(--bar);
}

.bullet-checkbox.checked::after {
  content: '✓';
  color: white;
  font-size: 18px;
  font-weight: 700;
}

.bullet-text {
  font-size: 34px;
  color: var(--text);
  line-height: 1.5;
}

.bullet-text.done {
  text-decoration: line-through;
  color: var(--text-secondary);
}

.note-callout {
  background: #FFF8E1;
  border-left: 4px solid var(--bar);
  padding: 24px 28px;
  border-radius: 0 12px 12px 0;
  margin: 24px 0;
  font-size: 30px;
  color: var(--text);
  line-height: 1.5;
}

.keyboard-hint {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 72px;
  background: #D1D3D9;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
}

.key-hint {
  font-size: 22px;
  color: var(--text-secondary);
}

.footer {
  position: absolute;
  bottom: 84px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  font-size: 22px;
  color: var(--text-secondary);
}
</style>
</head>
<body>
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <span>●●●●○</span>
      <span>WiFi</span>
      <span>100%</span>
    </div>
  </div>
  
  <div class="nav-bar">
    <div class="nav-back">‹ Notes</div>
    <div class="nav-action">Done</div>
  </div>
  
  <div class="note-container">
    <div class="note-date">{{date}}</div>
    <div class="note-title">{{title}}</div>
    <div class="note-divider"></div>
    
    <div class="note-text">{{introText}} <span class="highlight">{{highlightText}}</span></div>
    
    <div class="note-bullet">
      <div class="bullet-checkbox checked"></div>
      <div class="bullet-text done">{{item1}}</div>
    </div>
    <div class="note-bullet">
      <div class="bullet-checkbox checked"></div>
      <div class="bullet-text done">{{item2}}</div>
    </div>
    <div class="note-bullet">
      <div class="bullet-checkbox"></div>
      <div class="bullet-text">{{item3}}</div>
    </div>
    <div class="note-bullet">
      <div class="bullet-checkbox"></div>
      <div class="bullet-text">{{item4}}</div>
    </div>
    
    <div class="note-callout">{{calloutText}}</div>
    
    <div class="note-text"><span class="bold">{{bottomText}}</span></div>
  </div>
  
  <div class="footer">
    <span>{{handle}}</span>
    <span>swipe ›</span>
  </div>
</body>
</html>
