<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Bebas+Neue&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  position: relative;
}

:root {
  --bg: #FAFAFA;
  --accent: #4F46E5;
  --accent-light: #EEF2FF;
  --text: #111827;
  --text-muted: #9CA3AF;
  --card-bg: #FFFFFF;
  --border: #E5E7EB;
}

.top-stripe {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 8px;
  background: var(--accent);
}

.content {
  position: relative;
  z-index: 2;
  padding: 80px;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.step-label {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 4px;
  margin-bottom: 28px;
}

.big-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 320px;
  color: var(--accent);
  line-height: 0.8;
  opacity: 0.08;
  position: absolute;
  right: 60px;
  top: 60px;
}

.step-title {
  font-size: 64px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 24px;
  max-width: 700px;
}

.step-divider {
  width: 80px;
  height: 5px;
  background: var(--accent);
  border-radius: 3px;
  margin-bottom: 32px;
}

.step-description {
  font-size: 36px;
  font-weight: 600;
  color: #4B5563;
  line-height: 1.6;
  max-width: 720px;
  margin-bottom: 40px;
}

.tip-card {
  background: var(--card-bg);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 36px 40px;
  margin-top: auto;
  margin-bottom: 60px;
}

.tip-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}

.tip-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--accent);
  font-weight: 800;
}

.tip-label {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
}

.tip-text {
  font-size: 30px;
  color: #6B7280;
  line-height: 1.5;
}

.step-dots {
  position: absolute;
  bottom: 52px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--border);
}

.dot.active {
  background: var(--accent);
  width: 36px;
  border-radius: 6px;
}

.footer {
  position: absolute;
  bottom: 52px;
  left: 80px;
  right: 80px;
  display: flex;
  justify-content: space-between;
  font-size: 24px;
  color: var(--text-muted);
}
</style>
</head>
<body>
  <div class="top-stripe"></div>
  <div class="big-number">{{stepNumber}}</div>
  
  <div class="content">
    <div class="step-label">STEP {{stepNumber}} OF {{totalSteps}}</div>
    <div class="step-title">{{stepTitle}}</div>
    <div class="step-divider"></div>
    <div class="step-description">{{stepDescription}}</div>
    
    <div class="tip-card">
      <div class="tip-header">
        <div class="tip-icon">!</div>
        <div class="tip-label">PRO TIP</div>
      </div>
      <div class="tip-text">{{tipText}}</div>
    </div>
  </div>
  
  <div class="footer">
    <span>{{handle}}</span>
    <span>save for later</span>
  </div>
</body>
</html>
