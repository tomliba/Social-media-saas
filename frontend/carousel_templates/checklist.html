<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  padding: 100px 80px;
}

:root {
  --bg: #1a1a1a;
  --accent: #00E676;
  --text: #FFFFFF;
  --text-muted: #888888;
}

.label {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.title {
  font-size: 60px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 56px;
}

.items {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.item {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 28px 32px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 16px;
  backdrop-filter: blur(8px);
}

.check-box {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 20px;
  color: #111;
  font-weight: 800;
}

.item-text {
  font-size: 36px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
}

.item.empty { display: none; }
</style>
</head>
<body>
  <div class="label">DAILY HABITS</div>
  <div class="title">{{title}}</div>
  <div class="items">
    <div class="item">
      <div class="check-box">&#10003;</div>
      <div class="item-text">{{item1}}</div>
    </div>
    <div class="item">
      <div class="check-box">&#10003;</div>
      <div class="item-text">{{item2}}</div>
    </div>
    <div class="item">
      <div class="check-box">&#10003;</div>
      <div class="item-text">{{item3}}</div>
    </div>
    <div class="item">
      <div class="check-box">&#10003;</div>
      <div class="item-text">{{item4}}</div>
    </div>
    <div class="item {{item5}}empty">
      <div class="check-box">&#10003;</div>
      <div class="item-text">{{item5}}</div>
    </div>
  </div>
</body>
</html>
