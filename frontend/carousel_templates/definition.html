<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 100px;
}

:root {
  --bg: #1a1a1a;
  --accent: #E91E63;
  --text: #FFFFFF;
  --text-muted: #888888;
}

.word {
  font-size: 76px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 16px;
}

.pronunciation {
  font-size: 32px;
  font-weight: 400;
  font-style: italic;
  color: var(--accent);
  margin-bottom: 8px;
}

.part-of-speech {
  font-size: 32px;
  font-weight: 600;
  font-style: italic;
  color: var(--accent);
  opacity: 0.7;
  margin-bottom: 48px;
}

.divider {
  width: 100%;
  height: 2px;
  background: var(--text-muted);
  opacity: 0.3;
  margin-bottom: 48px;
}

.definition-text {
  font-size: 48px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 48px;
}

.quote-block {
  border-left: 4px solid var(--accent);
  padding-left: 32px;
  margin-bottom: 64px;
}

.quote-block .definition-text {
  font-style: italic;
  opacity: 0.85;
  margin-bottom: 0;
}

.see-also {
  font-size: 28px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 4px;
  text-transform: uppercase;
  position: absolute;
  bottom: 80px;
  left: 100px;
}
</style>
</head>
<body>
  <div class="word">{{word}}</div>
  <div class="pronunciation">{{pronunciation}}</div>
  <div class="part-of-speech">{{partOfSpeech}}</div>
  <div class="divider"></div>
  <div class="quote-block">
    <div class="definition-text">{{definitionText}}</div>
  </div>
  <div class="see-also">SEE ALSO &mdash;</div>
</body>
</html>
