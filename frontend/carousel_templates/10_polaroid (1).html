<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

:root {
  --bg: #F5F0EB;
  --accent: #764ba2;
  --text: #333333;
  --text-muted: #999999;
}

.polaroid {
  background: #FFFFFF;
  padding: 36px 36px 120px;
  box-shadow: 0 8px 40px rgba(0,0,0,.1);
  transform: rotate(-1.5deg);
  max-width: 720px;
  width: 100%;
}

.polaroid-image {
  width: 100%;
  height: 540px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-radius: 4px;
  position: relative;
}

.image-tag {
  position: absolute;
  bottom: 24px;
  right: 24px;
  background: rgba(0,0,0,.45);
  border-radius: 24px;
  padding: 8px 24px;
  font-size: 22px;
  color: #fff;
}

.polaroid-caption {
  margin-top: 36px;
}

.caption-text {
  font-family: 'Caveat', cursive;
  font-size: 44px;
  color: var(--text);
  transform: rotate(-0.5deg);
  line-height: 1.3;
}

.caption-annotation {
  font-family: 'Caveat', cursive;
  font-size: 30px;
  color: var(--text-muted);
  margin-top: 12px;
}

.progress-dots {
  margin-top: 52px;
  display: flex;
  gap: 10px;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #ddd;
}

.dot.active {
  background: var(--accent);
}

.handle {
  position: absolute;
  bottom: 52px;
  font-size: 24px;
  color: var(--text-muted);
}
</style>
</head>
<body>
  <div class="polaroid">
    <div class="polaroid-image">
      <div class="image-tag">{{imageTag}}</div>
    </div>
    <div class="polaroid-caption">
      <div class="caption-text">{{captionText}}</div>
      <div class="caption-annotation">{{annotation}} ↗</div>
    </div>
  </div>
  
  <div class="progress-dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  
  <div class="handle">{{handle}}</div>
</body>
</html>
