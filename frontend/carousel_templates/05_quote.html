<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

:root {
  --bg: #1a1a1a;
  --accent: #E91E63;
  --text: #FFFFFF;
  --text-muted: #888888;
}

.quote-open {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 240px;
  color: var(--accent);
  opacity: 0.35;
  line-height: 0.6;
  margin-bottom: -20px;
}

.quote-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-style: italic;
  font-size: 56px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
  max-width: 760px;
  padding: 0 80px;
  margin-bottom: 16px;
}

.quote-close {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 240px;
  color: var(--accent);
  opacity: 0.35;
  line-height: 0.3;
  transform: rotate(180deg);
  margin-bottom: 48px;
}

.quote-divider {
  width: 60px;
  height: 2px;
  background: var(--accent);
  margin-bottom: 32px;
}

.quote-attribution {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.quote-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 3px solid var(--accent);
  overflow: hidden;
  position: relative;
}


.quote-author {
  font-size: 32px;
  font-weight: 500;
  color: var(--text-muted);
}

.swipe-hint {
  position: absolute;
  bottom: 64px;
  font-size: 24px;
  color: var(--text-muted);
}
</style>
</head>
<body>
  <div class="quote-open">"</div>
  <div class="quote-text">{{quoteText}}</div>
  <div class="quote-close">"</div>
  <div class="quote-divider"></div>
  <div class="quote-attribution">
    <div class="quote-avatar">
      <img id="avatar-fallback" src="/previews/default-avatar.png" alt="" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:50%;" />
      <img src="{{photoUrl}}" alt="" onload="this.style.display='block';document.getElementById('avatar-fallback').style.display='none'" onerror="this.style.display='none'" style="display:none" />
    </div>
    <div class="quote-author">— {{author}}</div>
  </div>
  <div class="swipe-hint">swipe for the framework ›</div>
</body>
</html>
