<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

:root {
  --bg: #1a1a1a;
  --accent: #FFB300;
  --text: #FFFFFF;
  --text-muted: #888888;
}

.brain-emoji {
  font-size: 72px;
  margin-bottom: 32px;
}

.hook {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 48px;
}

.fact-title {
  font-size: 64px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  max-width: 820px;
  padding: 0 80px;
  margin-bottom: 40px;
}

.divider {
  width: 80px;
  height: 2px;
  background: var(--accent);
  margin-bottom: 40px;
}

.fact-body {
  font-size: 40px;
  font-weight: 400;
  color: var(--text-muted);
  line-height: 1.5;
  max-width: 760px;
  padding: 0 80px;
  margin-bottom: 48px;
}

.source-pill {
  display: inline-block;
  padding: 10px 32px;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,.15);
  font-size: 24px;
  font-weight: 600;
  color: var(--text-muted);
  position: absolute;
  bottom: 72px;
}
</style>
</head>
<body>
  <div class="brain-emoji">&#129504;</div>
  <div class="hook">{{hook}}</div>
  <div class="fact-title">{{factTitle}}</div>
  <div class="divider"></div>
  <div class="fact-body">{{factBody}}</div>
  <div class="source-pill">Source</div>
</body>
</html>
