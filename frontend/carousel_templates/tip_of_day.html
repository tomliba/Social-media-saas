<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

:root {
  --bg: #1a1a1a;
  --accent: #FFD600;
  --text: #FFFFFF;
  --text-muted: #888888;
}

.icon-box {
  width: 96px;
  height: 96px;
  border-radius: 24px;
  background: rgba(255,214,0,.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  margin-bottom: 40px;
}

.tip-number {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.tip-title {
  font-size: 68px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.15;
  max-width: 820px;
  padding: 0 80px;
  margin-bottom: 40px;
}

.divider {
  width: 80px;
  height: 2px;
  background: var(--accent);
  margin-bottom: 40px;
}

.tip-body {
  font-size: 40px;
  font-weight: 400;
  color: var(--text-muted);
  line-height: 1.5;
  max-width: 760px;
  padding: 0 80px;
}
</style>
</head>
<body>
  <div class="icon-box">&#9889;</div>
  <div class="tip-number">{{tipNumber}}</div>
  <div class="tip-title">{{tipTitle}}</div>
  <div class="divider"></div>
  <div class="tip-body">{{tipBody}}</div>
</body>
</html>
