<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

:root {
  --bg: #1a1a1a;
  --accent: #FF6B35;
  --text: #FFFFFF;
  --text-muted: #888888;
  --photo-display: none;
}

.accent-strip {
  position: absolute;
  left: 0;
  top: 0;
  width: 6px;
  height: 100%;
  background: var(--accent);
}

.label {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 64px;
}

.opinion {
  font-size: 64px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  text-align: center;
  max-width: 820px;
  padding: 0 80px;
}

.divider {
  width: 80px;
  height: 2px;
  background: var(--accent);
  margin: 56px 0;
}

.attribution {
  display: flex;
  align-items: center;
  gap: 16px;
}

.author-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 3px solid var(--accent);
  overflow: hidden;
  position: relative;
}


.author-name {
  font-size: 32px;
  font-weight: 500;
  color: var(--text-muted);
}
</style>
</head>
<body>
  <div class="accent-strip"></div>
  <div class="label">{{label}}</div>
  <div class="opinion">{{opinion}}</div>
  <div class="divider"></div>
  <div class="attribution">
    <div class="author-avatar">
      <img id="avatar-fallback" src="/previews/default-avatar.png" alt="" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:50%;" />
      <img src="{{photoUrl}}" alt="" onload="this.style.display='block';document.getElementById('avatar-fallback').style.display='none'" onerror="this.style.display='none'" style="display:none" />
    </div>
    <div class="author-name">{{authorName}}</div>
  </div>
</body>
</html>
