<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

:root {
  --bg: #1a1a1a;
  --accent: #FF6B35;
  --text: #FFFFFF;
  --text-muted: #888888;
  --photo-display: none;
}

.accent-strip {
  position: absolute;
  left: 0;
  top: 0;
  width: 6px;
  height: 100%;
  background: var(--accent);
}

.label {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 64px;
}

.opinion {
  font-size: 64px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  text-align: center;
  max-width: 820px;
  padding: 0 80px;
}

.divider {
  width: 80px;
  height: 2px;
  background: var(--accent);
  margin: 56px 0;
}

.attribution {
  display: flex;
  align-items: center;
  gap: 16px;
}

.author-photo {
  display: var(--photo-display);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  border: 3px solid var(--accent);
}

.author-name {
  font-size: 32px;
  font-weight: 500;
  color: var(--text-muted);
}
</style>
</head>
<body>
  <div class="accent-strip"></div>
  <div class="label">{{label}}</div>
  <div class="opinion">{{opinion}}</div>
  <div class="divider"></div>
  <div class="attribution">
    <img class="author-photo" src="{{photoUrl}}" alt="" />
    <div class="author-name">{{authorName}}</div>
  </div>
</body>
</html>
