<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  position: relative;
  background: #1a1a2e;
}

:root {
  --accent2: #E91E63;
}

.bg-image {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #533483 100%);
  opacity: 0.8;
}

.fade-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 65%;
  background: linear-gradient(transparent, rgba(0,0,0,.9));
  z-index: 1;
}

.tag {
  position: absolute;
  top: 60px;
  left: 60px;
  background: rgba(255,255,255,.12);
  border-radius: 28px;
  padding: 12px 32px;
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 3px;
  z-index: 5;
}

.slide-number {
  position: absolute;
  top: 64px;
  right: 60px;
  font-size: 24px;
  color: rgba(255,255,255,.5);
  z-index: 5;
}

.content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 80px;
  z-index: 3;
}

.headline {
  font-size: 72px;
  font-weight: 800;
  color: #fff;
  line-height: 1.1;
  margin-bottom: 24px;
}

.subtitle {
  font-size: 36px;
  color: rgba(255,255,255,.7);
  line-height: 1.5;
  margin-bottom: 32px;
  max-width: 800px;
}

.author {
  display: flex;
  gap: 20px;
  align-items: center;
}

.author-avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, #E91E63, #9C27B0);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: #fff;
  font-weight: 700;
}

.author-name {
  font-size: 28px;
  color: #fff;
  font-weight: 600;
}

.author-handle {
  font-size: 22px;
  color: rgba(255,255,255,.5);
  margin-top: 2px;
}
</style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="fade-overlay"></div>
  <div class="tag">{{tag}}</div>
  <div class="slide-number">{{slideNumber}} / {{totalSlides}}</div>
  
  <div class="content">
    <div class="headline">{{headline}}</div>
    <div class="subtitle">{{subtitle}}</div>
    <div class="author">
      <div class="author-avatar">{{initial}}</div>
      <div>
        <div class="author-name">{{displayName}}</div>
        <div class="author-handle">{{handle}}</div>
      </div>
    </div>
  </div>
</body>
</html>
