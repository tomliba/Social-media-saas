name: CI

on:
  pull_request:

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit + integration tests
        run: npm test

# Note: Playwright is intentionally NOT in CI yet — it needs a running dev
# server and browser binaries. Add a separate job once Layer 3 lands.
